<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d18"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect width="180" height="180" rx="40" fill="none" stroke="#00D4FF" stroke-width="4" opacity="0.3"/>
  <text x="90" y="132" font-family="Arial Black,Arial,sans-serif" font-size="112" font-weight="900" fill="#00D4FF" text-anchor="middle" filter="url(#glow)">V</text>
</svg>
