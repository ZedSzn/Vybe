services:
  - type: web
    name: vybe-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_BACKEND_URL
        value: ""
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://vybelivechat.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_DOMAIN
        value: vybelivechat.com
